<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sampler Prototype</title>
</head>
<body>
<h2>Sampler Prototype</h2>

<label>Metronome: <input type="checkbox" id="metroToggle"></label>
&nbsp;&nbsp;
<label>BPM: <input type="number" id="metroBPM" value="120" min="40" max="300" style="width: 60px;"></label><br><br>

<input type="file" id="fileInput" accept="audio/*">
&nbsp;OR&nbsp;
<button id="recordBtn">🎤 Record</button>
<span id="recordStatus" style="color: red; display: none; font-weight: bold;">🔴 Recording...</span>
<br><br>

<label>Mode:
  <select id="mode">
    <option value="pitch">Pitch Mode — keys play same sample at different pitches</option>
    <option value="slice">Slice Mode — keys play different chunks of the sample</option>
  </select>
</label><br><br>

<div id="pitchControls">
  <label>Root Note (MIDI): <input type="number" id="rootNote" value="60" min="0" max="127"> (60 = C4)</label><br><br>
</div>

<div id="sliceControls" style="display:none">
  <label>Slice interval (ms): <input type="number" id="sliceInterval" value="500" min="1" step="1"></label>
  &nbsp;&nbsp;
  <label>Start key (MIDI): <input type="number" id="startKey" value="36" min="0" max="127"> (36 = C2)</label>
  &nbsp;&nbsp;
  <button id="resliceBtn">Auto Re-slice</button>
  <button id="clearSlicesBtn">Clear Slices (Start Fresh)</button><br><br>
  <label>Slices: <span id="sliceCount">—</span></label><br><br>
  <canvas id="waveform" width="700" height="80" style="border:1px solid #ccc; display:block; margin-bottom:6px;"></canvas>
  <p style="font-size:12px; color:#666;">Each coloured band = one slice. <b>Hover & drag lines</b> to adjust. <b>Double-click</b> inside a slice to split it.</p><br>
</div>

<label>Volume: <input type="range" id="volume" min="0" max="2" step="0.01" value="1"></label><br><br>
<label>Loop slice: <input type="checkbox" id="loop"></label><br><br>
<label>Playthrough: <input type="checkbox" id="playThrough"></label><br><br>
<label>One-Shot: <input type="checkbox" id="oneShot"></label><br><br>
<label>Reverse playback: <input type="checkbox" id="reversePlayback"></label><br><br>

<p id="status">Load a sample to begin.</p>
<p id="midiStatus">MIDI: searching...</p>
<p id="activeNote"></p>

<script>
let audioCtx, masterGain, sampleBuffer, reversedSampleBuffer;
const active = {};
let slices = [];

function initAudio() {
  if (audioCtx) return;
  audioCtx = new AudioContext();
  masterGain = audioCtx.createGain();
  masterGain.connect(audioCtx.destination);
}

// ── Reverse Array Helper ───────────────────────────────────────────────────────
function reverseBuffer(buffer) {
  if (!buffer) return null;
  const rev = audioCtx.createBuffer(buffer.numberOfChannels, buffer.length, buffer.sampleRate);
  for (let i = 0; i < buffer.numberOfChannels; i++) {
    rev.getChannelData(i).set(buffer.getChannelData(i).slice().reverse());
  }
  return rev;
}

// ── File load ──────────────────────────────────────────────────────────────────
document.getElementById('fileInput').addEventListener('change', async e => {
  initAudio();
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('status').textContent = 'Loading...';
  try {
    sampleBuffer = await audioCtx.decodeAudioData(await file.arrayBuffer());
    reversedSampleBuffer = reverseBuffer(sampleBuffer);
    document.getElementById('status').textContent =
      `Loaded: ${file.name}  (${sampleBuffer.duration.toFixed(3)}s)`;
    buildSlices();
  } catch {
    document.getElementById('status').textContent = 'Error decoding audio.';
  }
});

// ── Live Recording ─────────────────────────────────────────────────────────────
let mediaRecorder;
let recordedChunks = [];
let isRecording = false;

document.getElementById('recordBtn').addEventListener('click', async () => {
  initAudio(); 

  if (isRecording) {
    mediaRecorder.stop();
    document.getElementById('recordBtn').textContent = '🎤 Record';
    document.getElementById('recordStatus').style.display = 'none';
    isRecording = false;
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    recordedChunks = [];

    mediaRecorder.ondataavailable = e => {
      if (e.data.size > 0) recordedChunks.push(e.data);
    };

    mediaRecorder.onstop = async () => {
      document.getElementById('status').textContent = 'Processing recording...';
      const blob = new Blob(recordedChunks, { type: 'audio/webm' }); 
      
      try {
        const arrayBuffer = await blob.arrayBuffer();
        sampleBuffer = await audioCtx.decodeAudioData(arrayBuffer);
        reversedSampleBuffer = reverseBuffer(sampleBuffer);
        document.getElementById('status').textContent = 
          `Recorded Audio Loaded (${sampleBuffer.duration.toFixed(3)}s)`;
        buildSlices();
      } catch (err) {
        document.getElementById('status').textContent = 'Error decoding microphone audio.';
      }

      stream.getTracks().forEach(track => track.stop());
    };

    mediaRecorder.start();
    document.getElementById('recordBtn').textContent = '⏹ Stop';
    document.getElementById('recordStatus').style.display = 'inline';
    isRecording = true;

  } catch (err) {
    document.getElementById('status').textContent = 'Microphone access denied or unavailable.';
  }
});

// ── Slicing ────────────────────────────────────────────────────────────────────
function buildSlices() {
  if (!sampleBuffer) return;
  const intervalSec = parseFloat(document.getElementById('sliceInterval').value) / 1000;
  const dur = sampleBuffer.duration;
  slices = [];
  for (let t = 0; t < dur; t += intervalSec) {
    slices.push({ start: t, end: Math.min(t + intervalSec, dur) });
  }
  document.getElementById('sliceCount').textContent = slices.length;
  drawWaveform();
}

document.getElementById('resliceBtn').addEventListener('click', buildSlices);
document.getElementById('sliceInterval').addEventListener('change', buildSlices);
document.getElementById('startKey').addEventListener('change', drawWaveform);

document.getElementById('clearSlicesBtn').addEventListener('click', () => {
  if (!sampleBuffer) return;
  // Reset to a single slice encompassing the entire sample
  slices = [{ start: 0, end: sampleBuffer.duration }];
  document.getElementById('sliceCount').textContent = slices.length;
  drawWaveform();
});

// ── Waveform + slice overlay ───────────────────────────────────────────────────
const COLORS = ['#e74c3c','#e67e22','#f1c40f','#27ae60','#16a085','#2980b9','#8e44ad','#c0392b'];

function noteToName(n) {
  return ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'][n % 12] + (Math.floor(n / 12) - 1);
}

function drawWaveform(highlightSlice = -1) {
  if (!sampleBuffer) return;
  const canvas = document.getElementById('waveform');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const data = sampleBuffer.getChannelData(0);
  const dur = sampleBuffer.duration;
  const startKey = parseInt(document.getElementById('startKey').value);

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#f5f5f5';
  ctx.fillRect(0, 0, W, H);

  // Slice bands
  slices.forEach((sl, i) => {
    const x1 = (sl.start / dur) * W;
    const x2 = (sl.end / dur) * W;
    const col = COLORS[i % COLORS.length];
    ctx.fillStyle = i === highlightSlice ? col + '88' : col + '28';
    ctx.fillRect(x1, 0, x2 - x1, H);
    ctx.strokeStyle = col;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x1, 0); ctx.lineTo(x1, H); ctx.stroke();
    if (x2 - x1 > 16) {
      ctx.fillStyle = '#222';
      ctx.font = '9px monospace';
      ctx.fillText(noteToName(startKey + i), x1 + 3, 11);
    }
  });

  // Waveform
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  const step = Math.max(1, Math.floor(data.length / W));
  const amp = H / 2;
  ctx.beginPath();
  for (let i = 0; i < W; i++) {
    let min = 1, max = -1;
    for (let j = 0; j < step; j++) {
      const d = data[i * step + j] || 0;
      if (d < min) min = d;
      if (d > max) max = d;
    }
    ctx.moveTo(i, (1 + min) * amp);
    ctx.lineTo(i, (1 + max) * amp);
  }
  ctx.stroke();
}

// ── Interactive Slice Dragging & Splitting ─────────────────────────────────────
const canvasEl = document.getElementById('waveform');
let draggedMarker = -1; 

canvasEl.addEventListener('mousedown', e => {
  if (!sampleBuffer || slices.length < 2) return;
  const rect = canvasEl.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const W = canvasEl.width;
  const dur = sampleBuffer.duration;

  // Check if we clicked near any slice boundary (except the very first and last)
  for (let i = 1; i < slices.length; i++) {
    const markerX = (slices[i].start / dur) * W;
    if (Math.abs(x - markerX) < 6) { 
      draggedMarker = i;
      return;
    }
  }
});

canvasEl.addEventListener('mousemove', e => {
  if (!sampleBuffer) return;
  const rect = canvasEl.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const W = canvasEl.width;
  const dur = sampleBuffer.duration;

  // Handle Dragging
  if (draggedMarker !== -1) {
    let t = (x / W) * dur;
    
    // Constrain the drag so it can't cross the previous or next slice markers
    const minT = slices[draggedMarker - 1].start + 0.01; 
    const maxT = slices[draggedMarker].end - 0.01;
    t = Math.max(minT, Math.min(t, maxT));
    
    // Update the boundary
    slices[draggedMarker].start = t;
    slices[draggedMarker - 1].end = t;
    
    drawWaveform();
    return;
  }

  // Handle Hover state 
  let hover = false;
  for (let i = 1; i < slices.length; i++) {
    const markerX = (slices[i].start / dur) * W;
    if (Math.abs(x - markerX) < 6) {
      hover = true;
      break;
    }
  }
  canvasEl.style.cursor = hover ? 'col-resize' : 'default';
});

canvasEl.addEventListener('mouseup', () => draggedMarker = -1);
canvasEl.addEventListener('mouseleave', () => draggedMarker = -1);

// Add New Slice on Double-Click
canvasEl.addEventListener('dblclick', e => {
  if (!sampleBuffer) return;
  const rect = canvasEl.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const W = canvasEl.width;
  const t = (x / W) * sampleBuffer.duration;

  // Find which slice we clicked inside and split it
  for (let i = 0; i < slices.length; i++) {
    if (t > slices[i].start && t < slices[i].end) {
      const oldEnd = slices[i].end;
      slices[i].end = t;
      // Insert the new slice right after the current one
      slices.splice(i + 1, 0, { start: t, end: oldEnd });
      
      document.getElementById('sliceCount').textContent = slices.length;
      drawWaveform();
      break;
    }
  }
});

// ── Playback ───────────────────────────────────────────────────────────────────
function playNote(midi) {
  if (!sampleBuffer) return;
  
  if (active[midi]) stopNote(midi);

  const mode = document.getElementById('mode').value;
  const isReverse = document.getElementById('reversePlayback').checked;

  if (mode === 'slice') {
    for (let key in active) {
      stopNote(key);
    }
  }

  const src = audioCtx.createBufferSource();
  const voiceGain = audioCtx.createGain(); 

  if (isReverse && reversedSampleBuffer) {
    src.buffer = reversedSampleBuffer;
  } else {
    src.buffer = sampleBuffer;
  }
  
  src.loop = document.getElementById('loop').checked;

  src.connect(voiceGain);
  voiceGain.connect(masterGain);

  src.onended = () => {
    if (active[midi] && active[midi].src === src && !active[midi].isStopping) {
      active[midi].gain.disconnect();
      delete active[midi];
      if (Object.keys(active).length === 0) {
        document.getElementById('activeNote').textContent = '';
        if (document.getElementById('mode').value === 'slice') drawWaveform();
      }
    }
  };

  if (mode === 'pitch') {
    const root = parseInt(document.getElementById('rootNote').value);
    src.playbackRate.value = Math.pow(2, (midi - root) / 12);
    src.start();
    document.getElementById('activeNote').textContent =
      `Playing: ${noteToName(midi)} (MIDI ${midi}) ${isReverse ? '[REV]' : ''}`;
  } else {
    const startKey = parseInt(document.getElementById('startKey').value);
    const idx = midi - startKey;
    if (idx < 0 || idx >= slices.length) return;
    
    const sl = slices[idx];
    const playThrough = document.getElementById('playThrough').checked;
    
    let slStart = sl.start;
    let slEnd = sl.end;
    
    if (isReverse) {
      slStart = sampleBuffer.duration - sl.end;
      slEnd = sampleBuffer.duration - sl.start;
    }
    
    if (src.loop && !playThrough) {
      src.loopStart = slStart;
      src.loopEnd = slEnd;
      src.start(0, slStart); 
    } else if (playThrough) {
      src.start(0, slStart);
    } else {
      src.start(0, slStart, slEnd - slStart);
    }

    document.getElementById('activeNote').textContent =
      `Playing slice ${idx} ${isReverse ? '[REV]' : ''} |  ${noteToName(midi)} (MIDI ${midi})`;
    drawWaveform(idx);
  }

  active[midi] = { src: src, gain: voiceGain, isStopping: false };
}

function stopNote(midi) {
  if (!active[midi]) return;

  const voice = active[midi];
  
  if (voice.isStopping) return;
  voice.isStopping = true;

  const fadeOutTime = 0.03; 
  const now = audioCtx.currentTime;

  voice.gain.gain.setValueAtTime(voice.gain.gain.value, now);
  voice.gain.gain.linearRampToValueAtTime(0.001, now + fadeOutTime);

  setTimeout(() => {
    try { voice.src.stop(); } catch {}
    voice.gain.disconnect(); 
    
    if (active[midi] === voice) {
      delete active[midi];

      if (Object.keys(active).length === 0) {
        document.getElementById('activeNote').textContent = '';
        if (document.getElementById('mode').value === 'slice') drawWaveform();
      }
    }
  }, fadeOutTime * 1000 + 10);
}

// ── Controls ───────────────────────────────────────────────────────────────────
document.getElementById('mode').addEventListener('change', e => {
  document.getElementById('pitchControls').style.display = e.target.value === 'pitch' ? '' : 'none';
  document.getElementById('sliceControls').style.display  = e.target.value === 'slice' ? '' : 'none';
});

document.getElementById('volume').addEventListener('input', e => {
  if (masterGain) masterGain.gain.value = e.target.value;
});

// ── Metronome ──────────────────────────────────────────────────────────────────
let isMetroPlaying = false;
let currentBeat = 0;
let nextBeatTime = 0.0;
let metroInterval;

function nextBeat() {
  const bpm = parseInt(document.getElementById('metroBPM').value) || 120;
  const secondsPerBeat = 60.0 / bpm;
  nextBeatTime += secondsPerBeat;
  currentBeat = (currentBeat + 1) % 4; 
}

function scheduleBeat(beatNumber, time) {
  const osc = audioCtx.createOscillator();
  const oscGain = audioCtx.createGain();
  
  osc.connect(oscGain);
  oscGain.connect(masterGain);
  
  osc.frequency.value = (beatNumber === 0) ? 880 : 440; 
  
  osc.start(time);
  osc.stop(time + 0.05);
  
  oscGain.gain.setValueAtTime(1, time);
  oscGain.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
}

function metroScheduler() {
  while (nextBeatTime < audioCtx.currentTime + 0.1) {
    scheduleBeat(currentBeat, nextBeatTime);
    nextBeat();
  }
}

document.getElementById('metroToggle').addEventListener('change', e => {
  initAudio();
  isMetroPlaying = e.target.checked;
  
  if (isMetroPlaying) {
    currentBeat = 0;
    nextBeatTime = audioCtx.currentTime + 0.05; 
    metroInterval = setInterval(metroScheduler, 25);
  } else {
    clearInterval(metroInterval);
  }
});

// ── Computer keyboard ──────────────────────────────────────────────────────────
const octave = 4;
const keyMap = { a:0,w:1,s:2,e:3,d:4,f:5,t:6,g:7,y:8,h:9,u:10,j:11,k:12 };

document.addEventListener('keydown', e => {
  if (e.repeat || ['INPUT','SELECT'].includes(e.target.tagName)) return;
  const semi = keyMap[e.key.toLowerCase()];
  if (semi === undefined) return;
  initAudio();
  playNote(octave * 12 + semi);
});

document.addEventListener('keyup', e => {
  const semi = keyMap[e.key.toLowerCase()];
  if (semi === undefined) return;
  if (document.getElementById('oneShot').checked) return;
  stopNote(octave * 12 + semi);
});

// ── MIDI ───────────────────────────────────────────────────────────────────────
if (navigator.requestMIDIAccess) {
  navigator.requestMIDIAccess().then(access => {
    function connect() {
      [...access.inputs.values()].forEach(i => i.onmidimessage = e => {
        const [cmd, note, vel] = e.data;
        initAudio();
        if ((cmd & 0xf0) === 0x90 && vel > 0) {
          playNote(note);
        } else if ((cmd & 0xf0) === 0x80 || ((cmd & 0xf0) === 0x90 && vel === 0)) {
          if (!document.getElementById('oneShot').checked) {
            stopNote(note);
          }
        }
      });
      const inputs = [...access.inputs.values()];
      document.getElementById('midiStatus').textContent =
        inputs.length ? `MIDI: ${inputs[0].name}` : 'MIDI: no device found';
    }
    connect();
    access.onstatechange = connect;
  }).catch(() => {
    document.getElementById('midiStatus').textContent = 'MIDI: permission denied';
  });
} else {
  document.getElementById('midiStatus').textContent = 'MIDI: not supported in this browser';
}
</script>
</body>
</html>
